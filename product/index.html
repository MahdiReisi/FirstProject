<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال بارگذاری ...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-container">
            <div id="custom-animation-area">
                <!-- اینجا انیمیشن سفارشی شما قرار می‌گیرد -->
                <!-- به جای ماشین، از المان‌های CSS برای انیمیشن استفاده می‌کنیم -->
                <div class="spinner"></div>
            </div>
            <div class="loading-text">
                <h1>در حال بارگذاری صفحه ، شکیبا باشید  </h1>
                <p>   بارگذاری صفحه تا چند لحظه دیگر صورت می گیرد</p>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <span id="percentage">0%</span> 
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
