<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>سنگ کاغد قیچی</title>
</head>

<body>
    <div class="grid-container">
        <div class="items_box">
            <h1>سلاح خود را انتخاب کنید</h1>
            <div class="images_contain">
                <img src="images/paper.png" alt="" class="img-items">
                <img src="images/rock.png" alt="" class="img-items">
                <img src="images/scissors.png" alt="" class="img-items">
            </div>
            <h2> :انتخابِ سیستم</h2>
            <img src="images/paper.png" alt="" class="img-cpu-choosed hidden">
            <img src="images/rock.png" alt="" class="img-cpu-choosed hidden">
            <img src="images/scissors.png" alt="" class="img-cpu-choosed hidden">
        </div>

        <div class="result_box">
            <h1>:امتیاز ها</h1>
            <div class="result-container">
                <div class="user-point-container">
                    <h2> : کاربر</h2>
                    <div id="user-point">
                        0
                    </div>
                </div>
                <div class="cpu-point-container">
                    <h2> :سیستم </h2>
                    <div id="cpu-point">
                        0
                    </div>
                </div>
            </div>
        </div>
        <button>Refresh</button>
    </div>

    <script src="script.js"></script>










</body>

</html>
