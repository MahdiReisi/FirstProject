<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | صفجه ورود</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="h1">درود خوش برگشتید </h1>
    <div class="container">
        <h1 class="header">ورود </h1>
        <div class="formcontainer">
            <div class="username-section">
                <div class="input-group">
                    <input id="usernameInput" class="username" type="text" placeholder=" ">
                    <label for="usernameInput" class="placeholder-label">نام کاربری</label>

                </div>
            </div>
            <div class="password-section">
                <div class="input-group2">
                    <input id="passwordInput" class="password" type="password" placeholder=" ">
                    <label for="paswwordInput" class="placeholder-label2">رمز عبور</label>
                    <span id="toggle">👁</span>
                    <p class="status" id="status"></p>
                    <p class="login-status" id="login-status"></p>

                </div>
            </div>
            <button id="login-button" class="button">ورود</button>
            <a href="http://127.0.0.1:8080/first-project/Login__Signin/SignIn/"><button class="signIn">ثبت نام
                </button></a>


        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
